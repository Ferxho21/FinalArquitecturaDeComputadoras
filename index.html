<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operación: Arquitectura</title>
    <!-- Technical typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="main.css?v=3">
</head>
<body>
    <div class="grid-overlay"></div>

    <div class="layout" id="main-layout">
        <header class="sys-header">
            <div class="header-top">
                <div class="badge">SYS.BOOT // 2026.07.20</div>
                <div class="user-profile">
                    <span id="user-name">MODO LOCAL // OFFLINE</span>
                    <div class="sync-actions">
                        <button id="export-btn" class="action-btn" title="Exportar progreso">[ EXPORTAR ]</button>
                        <button id="import-btn" class="action-btn" title="Importar progreso">[ IMPORTAR ]</button>
                        <input type="file" id="import-file" style="display: none;" accept=".json">
                    </div>
                </div>
            </div>
            <h1>ARQUITECTURA DE COMPUTADORAS</h1>
            <p class="subtitle">Protocolo de estudio intensivo para examen final.</p>
            
            <a href="https://notebooklm.google.com/notebook/e5aa8dfa-36e1-4968-9b94-7f4fa3f9f703" target="_blank" style="display:inline-block; margin-bottom: 2rem; color: var(--primary-accent); font-family: var(--font-mono); font-size: 0.9rem; text-decoration: none; border: 1px solid var(--primary-accent); padding: 0.5rem 1rem; background: rgba(0, 255, 136, 0.1); transition: all 0.3s;" onmouseover="this.style.background='rgba(0, 255, 136, 0.2)'" onmouseout="this.style.background='rgba(0, 255, 136, 0.1)'">
                [ CONSULTAR MATERIAL CON IA ]
            </a>

            <div class="metrics">
                <div class="metric-label">INTEGRIDAD DE DATOS TOTAL</div>
                <div class="progress-track">
                    <div class="progress-fill" id="progress-bar"></div>
                </div>
                <div class="progress-stats" id="progress-text">0.0%</div>
            </div>
        </header>

        <main class="data-bus" id="schedule-container">
            <!-- JavaScript will inject timeline nodes here -->
        </main>
        
        <footer class="sys-footer">
            [ FIN DE TRANSMISIÓN ]
        </footer>
    </div>

    <script src="app.js?v=3"></script>
</body>
</html>
